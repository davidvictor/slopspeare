name: rules.json sync check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  sync-check:
    name: Verify rules.json matches RULES.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild rules.json from RULES.md
        run: node scripts/build-rules-json.mjs

      - name: Fail if rules.json differs from committed version
        run: |
          if ! git diff --exit-code rules.json; then
            echo ""
            echo "rules.json is out of sync with RULES.md."
            echo "Run: node scripts/build-rules-json.mjs"
            echo "Then commit the updated rules.json."
            exit 1
          fi
