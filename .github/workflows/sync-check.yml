name: rules.json sync check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  sync-check:
    name: Verify generated skill files match sources
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild generated files
        run: |
          node scripts/build-rules-json.mjs
          node scripts/build-agent-skills-index.mjs

      - name: Fail if generated files differ from committed versions
        run: |
          if ! git diff --exit-code rules.json .well-known/agent-skills; then
            echo ""
            echo "Generated skill files are out of sync."
            echo "Run:"
            echo "  node scripts/build-rules-json.mjs"
            echo "  node scripts/build-agent-skills-index.mjs"
            echo "Then commit the updated generated files."
            exit 1
          fi
